name: Flutter Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # 릴리즈 생성을 위해 쓰기 권한 필요

jobs:
  validate:
    name: Validate Version Sync
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version_check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract GitHub tag version
        id: version_check
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "GitHub Tag: v$TAG_VERSION"
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

          # Extract version from pubspec.yaml
          PUBSPEC_VERSION=$(grep -E "^version:" pubspec.yaml | sed 's/version: //' | tr -d ' ')
          APP_VERSION="${PUBSPEC_VERSION%+*}"
          echo "pubspec Version: $APP_VERSION"

          # Compare versions
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "❌ ERROR: Version mismatch!"
            echo "  GitHub Tag:  v$TAG_VERSION"
            echo "  App Version: $APP_VERSION"
            exit 1
          fi
          echo "✅ Version check passed!"

  build:
    name: Build and Release APK
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0' # 최신 패키지 요구사항에 맞춰 버전 업그레이드
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
