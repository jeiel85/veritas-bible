name: veritas_bible
description: "Veritas Bible - Open source cross-platform Bible reader app with offline support, search, and personalization."
publish_to: 'none'

version: 1.4.0+6

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.8.3
  path_provider: ^2.1.2
  flutter_tts: ^4.2.2
  screenshot: ^3.0.0
  share_plus: ^10.1.4
  table_calendar: ^3.1.2
  google_fonts: ^6.2.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1A237E"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sample_bible.json
    - assets/bible_krv.json
    - assets/bible_kjv.json
